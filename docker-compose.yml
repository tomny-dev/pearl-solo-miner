# Pearl (PRL) pool / solo miner for NVIDIA GPUs.
# Portable across Linux, Windows (Docker Desktop + WSL2) and macOS hosts.
# All runtime values come from the .env file (copy .env.example to .env first).

services:
  pearl-solo-miner:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Override the lpminer version/source without editing the Dockerfile.
        LPMINER_URL: ${LPMINER_URL:-https://pearl.luckypool.io/lpminer/lpminer-0.1.9.tar.gz}
        # Try a newer CUDA runtime for sm_120 GPUs, e.g. 13.0.1-runtime-ubuntu24.04
        CUDA_IMAGE_TAG: ${CUDA_IMAGE_TAG:-12.8.1-runtime-ubuntu24.04}
    image: pearl-solo-miner:latest
    container_name: pearl-solo-miner

    # lpminer reads stdin for its interactive commands (s = stats, q = quit).
    # When detached, a closed stdin reads EOF immediately and lpminer quits,
    # which the restart policy then loops forever. Keep stdin open so it runs
    # continuously in the background.
    stdin_open: true

    # Runtime configuration is provided entirely by the .env file.
    env_file:
      - .env

    # ---- GPU selection (cross-platform) ----
    # This device-reservation form works on Linux AND Docker Desktop (WSL2),
    # unlike "runtime: nvidia" which is Linux-only.
    #   GPU_COUNT=1    -> use one GPU   (default)
    #   GPU_COUNT=2    -> use two GPUs
    #   GPU_COUNT=all  -> use every GPU
    # To pick SPECIFIC physical cards instead of "the first N", comment out the
    # "count:" line and uncomment "device_ids:" below (e.g. ["1"] or ["0","2"]).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              # device_ids: ["0"]        # pin specific card(s); replaces count
              capabilities: [gpu, compute, utility]

    # Restart on crash, but stay down when you stop it on purpose.
    restart: unless-stopped
    stop_grace_period: 30s

    # ---- Security hardening (compatible with the NVIDIA runtime) ----
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Read-only root filesystem. The miner only needs writable scratch space,
    # which is provided by the tmpfs below and the /data volume.
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - miner_data:/data

volumes:
  miner_data:
